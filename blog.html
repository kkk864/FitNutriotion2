<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Блог — FitNutrition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo"><a href="index.html">FITNUTRITION</a></div>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="promotions.html">Акции</a>
        <a href="blog.html">Блог</a>
        <a href="about.html">О нас</a>
        <a href="delivery.html">Доставка</a>
        <a href="contacts.html">Контакты</a>
      </nav>
      <div class="header-actions">
        <form class="search-form" action="catalog.html" method="get">
          <input type="search" name="q" placeholder="Поиск..." aria-label="Поиск" id="search-input">
          <button type="submit">Найти</button>
        </form>
        <a href="cart.html" class="cart-link">Корзина <span id="cart-count" class="cart-count">0</span></a>
        <a href="register.html" class="btn btn-primary btn-sm">Регистрация</a>
        <a href="account.html" class="btn btn-ghost btn-sm">Войти</a>
      </div>
    </div>
  </header>

  <main class="main">
    <nav class="breadcrumbs"><a href="index.html">Главная</a> → Блог</nav>
    <h1 class="page-title">Блог: советы по спортивному питанию</h1>
    <div class="articles-list" id="articles-list"></div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div><h4>Каталог</h4><ul><li><a href="catalog.html">Все товары</a></li></ul></div>
      <div><h4>Информация</h4><ul><li><a href="about.html">О нас</a></li><li><a href="contacts.html">Контакты</a></li></ul></div>
    </div>
    <p class="footer-copy">© 2026 FitNutrition. Учебный проект.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const el = document.getElementById('articles-list');
      if (el && typeof BLOG_ARTICLES !== 'undefined') {
        el.innerHTML = BLOG_ARTICLES.map(a =>
          `<a href="blog-article.html?id=${a.id}" class="article-preview">
            <img src="${a.image}" alt="">
            <div>
              <h3>${a.title}</h3>
              <p>${a.excerpt} <strong>${a.date}</strong></p>
            </div>
          </a>`
        ).join('');
      }
    })();
  </script>
</body>
</html>

  <script>
    (function () {
      const el = document.getElementById('promotions-list');
      if (el && typeof PROMOTIONS !== 'undefined') {
        el.innerHTML = PROMOTIONS.map(p =>
          `<div class="promo-banner" style="text-align: left;">
            <strong>${p.title}</strong>
            ${p.code ? `<br>Промокод: <code style="background: rgba(0,0,0,0.2); padding: 0.2rem 0.5rem; border-radius: 4px;">${p.code}</code>` : ''}
            ${p.endDate ? `<br><small>Действует до ${p.endDate}</small>` : ''}
          </div>`
        ).join('');
      }
    })();
